
<!DOCTYPE html>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pressroom Pro Roll Calculator</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#020617">

<style>

body{
font-family:Arial;
background:#020617;
color:white;
margin:0;
padding:20px;
}

.tabs{
display:flex;
gap:10px;
margin-bottom:20px;
}

.tabbtn{
flex:1;
padding:12px;
background:#0f172a;
border:none;
color:white;
font-size:16px;
border-radius:8px;
cursor:pointer;
}

.tabbtn:hover{
background:#1e293b;
}

.card{
max-width:600px;
margin:auto;
background:#0f172a;
padding:20px;
border-radius:12px;
}

input{
width:100%;
padding:14px;
margin-top:10px;
border-radius:8px;
border:1px solid #334155;
background:#020617;
color:white;
font-size:16px;
}

.result{
font-size:22px;
font-weight:bold;
}

.banner{
background:#0f172a;
padding:10px;
text-align:center;
font-size:14px;
margin-bottom:20px;
}

</style>
</head>

<body>

<div class="banner">
📱 Add to Home Screen for faster pressroom access
</div>

<div class="tabs">
<button class="tabbtn" onclick="showTab('calc')">Roll Calculator</button>
<button class="tabbtn" onclick="showTab('remain')">Roll Remaining</button>
</div>

<div id="calc" class="card">

<h2>Roll Diameter Calculator</h2>

<label>Paper Thickness</label>
<select id="thickness" onchange="calc()">

<option value="0.0035">20# Bond (0.0035)</option>
<option value="0.0040">24# Bond (0.0040)</option>
<option value="0.0045">28# Bond (0.0045)</option>
<option value="0.0050">60# Offset (0.0050)</option>
<option value="0.0055" selected>70# Offset (0.0055)</option>
<option value="0.0060">80# Offset (0.0060)</option>
<option value="0.0070">100# Text (0.0070)</option>
<option value="0.0090">10pt Cover (0.0090)</option>

</select>

<label>Form Length (in)</label>
<input id="form" value="12" oninput="calc()">

<label>Core Diameter</label>
<input id="core" value="3" oninput="calc()">

<label>Roll Diameter</label>
<input id="roll" oninput="calc()">

<label>Total Forms</label>
<input id="forms" class="result" readonly>

<label>Total Feet</label>
<input id="feet" class="result" readonly>

</div>

<div id="remain" class="card" style="display:none">

<h2>Remaining Forms On Roll</h2>

<label>Paper Thickness</label>
<select id="thickness2" onchange="remaining()">

<option value="0.0035">20# Bond</option>
<option value="0.0040">24# Bond</option>
<option value="0.0045">28# Bond</option>
<option value="0.0050">60# Offset</option>
<option value="0.0055" selected>70# Offset</option>
<option value="0.0060">80# Offset</option>
<option value="0.0070">100# Text</option>
<option value="0.0090">10pt Cover</option>

</select>

<label>Form Length</label>
<input id="form2" value="12" oninput="remaining()">

<label>Core Diameter</label>
<input id="core2" value="3" oninput="remaining()">

<label>Current Roll Diameter</label>
<input id="roll2" oninput="remaining()">

<label>Remaining Forms</label>
<input id="forms2" class="result" readonly>

<label>Remaining Feet</label>
<input id="feet2" class="result" readonly>

</div>

<script>

function showTab(tab){
document.getElementById("calc").style.display="none"
document.getElementById("remain").style.display="none"
document.getElementById(tab).style.display="block"
}

function calc(){

let t=parseFloat(thickness.value)
let f=parseFloat(form.value)
let c=parseFloat(core.value)
let r=parseFloat(roll.value)

if(!t||!f||!c||!r)return

let length=(Math.PI*(r*r-c*c))/(4*t)

forms.value=(length/f).toFixed(0)
feet.value=(length/12).toFixed(0)

}

function remaining(){

let t=parseFloat(thickness2.value)
let f=parseFloat(form2.value)
let c=parseFloat(core2.value)
let r=parseFloat(roll2.value)

if(!t||!f||!c||!r)return

let length=(Math.PI*(r*r-c*c))/(4*t)

forms2.value=(length/f).toFixed(0)
feet2.value=(length/12).toFixed(0)

}

</script>

</body>
</html>

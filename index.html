
<!DOCTYPE html>
<html><link rel="manifest" href="manifest.json">
<head><meta name="theme-color" content="#020617">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cliff Roll Diameter Calculator</title>
<style>
body{font-family:Arial;background:#0f172a;color:white;margin:0;padding:20px}
.card{max-width:600px;margin:auto;background:#020617;padding:20px;border-radius:12px}
input,button{width:100%;padding:12px;margin-top:10px;border-radius:8px;border:1px solid #334155;background:#020617;color:white}
button{font-size:18px;font-weight:bold}
.result{font-size:20px;font-weight:bold}
</style>
</head>
<body>
  <div style="
background:#0f172a;
color:white;
padding:10px;
text-align:center;
font-size:14px;
">
📱 Add to Home Screen for faster access
</div>
<div class="card">
<h2>Cliff_Roll_Diam Calculator</h2>

<label>Paper Thickness (in)</label>
<input id="thickness" value="0.0055">

<label>Form Length (in)</label>
<input id="form" value="12">

<label>Core Diameter (in)</label>
<input id="core" value="3">

<label>Roll Diameter (in)</label>
<input id="roll">

<button onclick="calc()">CALCULATE</button>

<label>Total Forms</label>
<input id="forms" class="result" readonly>

<label>Total Feet</label>
<input id="feet" class="result" readonly>

</div>

<script>
function calc(){
let t=parseFloat(document.getElementById('thickness').value);
let f=parseFloat(document.getElementById('form').value);
let c=parseFloat(document.getElementById('core').value);
let r=parseFloat(document.getElementById('roll').value);
if(!t||!f||!c||!r){alert("Enter all values");return;}

let length=(Math.PI*(r*r-c*c))/(4*t);
let forms=(length/f);
let feet=(length/12);

document.getElementById('forms').value=forms.toFixed(2);
document.getElementById('feet').value=feet.toFixed(2);
}
</script>
</body>
</html>
